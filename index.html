<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Mister X – Die Rätselreise</title>
  <link rel="stylesheet" href="/assets/css/global.css">
  <style>
    .hero {
      min-height: 55dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem 1rem;
      text-align: center;
      position: relative;
    }
    .hero-gfx {
      font-size: 5rem;
      margin-bottom: 1rem;
      animation: float 3s ease-in-out infinite;
    }
    @keyframes float {
      0%,100%{ transform: translateY(0); }
      50%    { transform: translateY(-10px); }
    }
    .hero-sub {
      font-size: 1rem;
      color: var(--c-text-dim);
      max-width: 300px;
      margin: 0.5rem auto 1.5rem;
    }
    .grid-stations {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.5rem;
    }
    .station-dot {
      aspect-ratio: 1;
      border-radius: var(--radius-md);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: 1.4rem;
      border: 1px solid var(--c-border);
      background: var(--c-surface);
      cursor: pointer;
      transition: transform var(--anim-fast), border-color var(--anim-fast);
      text-decoration: none;
      padding: 0.5rem;
    }
    .station-dot:active { transform: scale(0.95); }
    .station-dot.done   { border-color: var(--c-success); background: rgba(61,232,154,0.08); }
    .station-dot.locked { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
    .station-dot .num   { font-family: var(--font-head); font-size: 0.65rem; color: var(--c-muted); }
    .setup-card input   { margin-bottom: 0.75rem; }
    .teacher-btn        { font-size: 0.75rem; color: var(--c-muted); text-align: center; margin-top: 0.5rem; cursor: pointer; }
  </style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar" class="topbar"></div>

<!-- HERO -->
<div class="hero">
  <div class="hero-gfx">🕵️</div>
  <h1>MISTER X</h1>
  <p class="hero-sub">Eine geheime Agentur braucht euch. Löst die Rätsel – entlarvt den Verdächtigen!</p>
  <span class="badge badge-gold">15 Stationen · Mission aktiv</span>
</div>

<!-- SETUP (erscheint nur ohne Spielername) -->
<div id="setupCard" class="page-wrap stack stack-md" style="display:none">
  <div class="card card-accent">
    <h3 style="margin-bottom:0.75rem;">👤 Agent-Name eingeben</h3>
    <input id="playerNameInput" class="input-field" type="text" placeholder="Dein Name, Agent..." maxlength="20">
    <button class="btn btn-primary btn-full" onclick="startGame()">Mission starten 🚀</button>
  </div>
</div>

<!-- STATIONSLISTE -->
<div id="stationList" class="page-wrap stack stack-md" style="display:none">

  <div class="card reveal">
    <div class="row-between" style="margin-bottom:0.75rem;">
      <h3>Deine Mission</h3>
      <span class="badge badge-cyan" id="progressBadge">0%</span>
    </div>
    <div class="progress-wrap" style="height:10px;">
      <div class="progress-fill" id="heroProgress" style="width:0%"></div>
    </div>
  </div>

  <div class="card reveal">
    <h3 style="margin-bottom:0.75rem;">📍 Alle Stationen</h3>
    <div class="grid-stations" id="stationGrid"></div>
  </div>

  <div class="card reveal">
    <div class="row" style="gap:0.75rem; margin-bottom:0.75rem;">
      <span style="font-size:1.5rem;">⭐</span>
      <div>
        <div style="font-weight:700;">Sterne gesammelt</div>
        <div id="totalStars" style="font-family:var(--font-head); font-size:1.4rem; color:var(--c-accent);">0</div>
      </div>
    </div>
    <div class="row" style="gap:0.75rem;">
      <span style="font-size:1.5rem;">💡</span>
      <div>
        <div style="font-weight:700;">Hinweise genutzt</div>
        <div id="totalHints" style="font-size:1.1rem; color:var(--c-muted);">0</div>
      </div>
    </div>
  </div>

  <!-- Teacher Mode -->
  <p class="teacher-btn" onclick="promptTeacher()">🔒 Lehrer-Modus</p>

</div>

<!-- SUCCESS OVERLAY (global) -->
<div id="successOverlay" class="success-overlay"></div>

<script src="/assets/js/game.js"></script>
<script>
  function startGame() {
    const name = document.getElementById('playerNameInput').value.trim();
    if (!name) { alert('Bitte einen Namen eingeben!'); return; }
    MX.state.playerName = name;
    MX.state.startTime  = Date.now();
    MX.saveState();
    showMain();
  }

  function showMain() {
    if (!MX.state.playerName) {
      document.getElementById('setupCard').style.display = 'block';
      document.getElementById('stationList').style.display = 'none';
    } else {
      document.getElementById('setupCard').style.display = 'none';
      document.getElementById('stationList').style.display = 'block';
      renderStationGrid();
    }
  }

  function renderStationGrid() {
    const grid = document.getElementById('stationGrid');
    const pct  = MX.progressPercent();
    document.getElementById('progressBadge').textContent = pct + '%';
    document.getElementById('heroProgress').style.width  = pct + '%';
    document.getElementById('totalStars').textContent    = MX.state.stars;
    document.getElementById('totalHints').textContent    = MX.state.hintsUsed;

    grid.innerHTML = MX.STATIONS.map((s, i) => {
      const num     = i + 1;
      const done    = MX.isCompleted(num);
      const locked  = num > MX.state.currentStation;
      const cls     = done ? 'done' : locked ? 'locked' : '';
      const icon    = done ? '✅' : s.icon;
      return `<a href="/station/${s.slug}" class="station-dot ${cls}" title="${s.name}">
        ${icon}
        <span class="num">${num}</span>
      </a>`;
    }).join('');
  }

  function promptTeacher() {
    const pin = prompt('Lehrer-PIN eingeben:');
    if (pin !== null) {
      const ok = MX.toggleTeacherMode(pin);
      if (ok) alert(MX.state.teacherMode ? '🔓 Lehrer-Modus aktiviert!' : '🔒 Lehrer-Modus deaktiviert');
      else alert('❌ Falscher PIN');
    }
  }

  // Init
  document.addEventListener('DOMContentLoaded', showMain);
</script>
</body>
</html>
